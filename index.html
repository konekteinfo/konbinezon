<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Konbinezon v2</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        select, input { width: 85%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 85%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 15px; }
        #result { margin-top: 20px; font-weight: bold; color: #333; padding: 15px; border-radius: 8px; min-height: 20px; white-space: pre-line; }
        .match { color: #28a745; background: #e8f5e9; border: 1px solid #28a745; }
        label { display: block; text-align: left; margin-left: 8%; font-size: 14px; color: #666; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Master Konbinezon</h2>
    
    <label>First Base:</label>
    <select id="type1">
        <option value="b1">Base 1</option>
        <option value="b2">Base 2</option>
        <option value="b3">Base 3</option>
        <option value="b4">Base 4</option>
        <option value="dbl">Double</option>
    </select>
    <input type="number" id="num1" placeholder="Enter Number">

    <label>Second Base:</label>
    <select id="type2">
        <option value="b1">Base 1</option>
        <option value="b2">Base 2</option>
        <option value="b3">Base 3</option>
        <option value="b4" selected>Base 4</option>
        <option value="dbl">Double</option>
    </select>
    <input type="number" id="num2" placeholder="Enter Number">

    <button onclick="findMatches()">Check All Matches</button>
    <div id="result"></div>
</div>

<script>
const data = {
    b1: {"01":["12","90","02","91"],"12":["23","01","13","02"],"23":["34","12","24","13"],"34":["45","23","35","24"],"45":["56","34","46","35"],"56":["67","45","57","46"],"67":["78","56","68","57"],"78":["89","67","79","68"],"89":["90","78","80","79"],"90":["01","89","91","80"]},
    b2: {"02":["13","91","01","12"],"13":["24","02","12","23"],"24":["35","13","23","34"],"35":["46","24","34","45"],"46":["57","35","45","56"],"57":["68","46","56","67"],"68":["79","57","67","78"],"79":["80","68","78","89"],"80":["91","79","89","90"],"91":["02","80","90","01"]},
    b3: {"03":["14","92","15","84","95","82"],"14":["25","03","26","95","06","93"],"25":["36","14","37","06","17","04"],"36":["47","25","48","17","28","15"],"47":["58","36","59","28","39","26"],"58":["69","47","60","39","40","37"],"69":["70","58","71","40","51","48"],"70":["81","69","82","51","62","59"],"81":["92","70","93","62","73","70"],"92":["03","81","04","73","84","81"]},
    b4: {
        "04":["15","93","95","96","85","25","92"],
        "15":["26","04","06","07","96","36","03"],
        "26":["37","15","17","18","07","47","14"],
        "37":["48","26","28","29","18","58","25"],
        "48":["59","37","39","30","29","69","36"],
        "59":["60","48","40","41","30","70","47"],
        "60":["71","59","51","52","41","81","48"],
        "71":["82","60","62","63","52","92","59"],
        "82":["93","71","73","74","63","03","70"],
        "93":["04","82","84","85","74","14","81"]
    },
    dbl: {"00":["18","92","91","12","98"],"11":["29","03","02","23","09"],"22":["30","14","13","34","10"],"33":["41","25","24","45","21"],"44":["52","36","35","56","32"],"55":["63","47","46","67","43"],"66":["74","58","57","78","54"],"77":["85","69","68","89","65"],"88":["96","70","79","90","76"],"99":["07","81","80","01","87"]}
};

function getMirror(val) { return val.padStart(2, '0').split('').reverse().join(''); }

function findMatches() {
    let t1 = document.getElementById('type1').value;
    let t2 = document.getElementById('type2').value;
    let n1 = document.getElementById('num1').value.padStart(2, '0');
    let n2 = document.getElementById('num2').value.padStart(2, '0');
    let display = document.getElementById('result');

    let key1 = data[t1][n1] ? n1 : (data[t1][getMirror(n1)] ? getMirror(n1) : null);
    let key2 = data[t2][n2] ? n2 : (data[t2][getMirror(n2)] ? getMirror(n2) : null);

    if (key1 && key2) {
        let list1 = data[t1][key1];
        let list2 = data[t2][key2];
        let found = [];

        list1.forEach(num => {
            let m = getMirror(num);
            if (list2.includes(num) || list2.includes(m)) { found.push(num); }
        });

        if (found.length > 0) {
            display.innerHTML = "✅ Matches Found:\n" + [...new Set(found)].join(', ');
            display.className = "match";
        } else {
            display.innerHTML = "❌ No matches between these rows.";
            display.className = "";
        }
    } else {
        display.innerHTML = "⚠️ Number not found in selected list.";
        display.className = "";
    }
}
</script>
</body>
</html>
