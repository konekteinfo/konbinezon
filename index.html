<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orionyx Master Matcher</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #1a1a2e; color: white; text-align: center; }
        .card { background: #16213e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 450px; margin: auto; border: 1px solid #0f3460; }
        select, input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #0f3460; border-radius: 8px; font-size: 16px; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 90%; padding: 15px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        #result-box { margin-top: 20px; text-align: left; background: #0f3460; padding: 15px; border-radius: 10px; display: none; }
        .list-title { color: #e94560; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .number-line { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 5px; margin-bottom: 10px; font-family: monospace; word-spacing: 5px; }
        .match-highlight { color: #4ee44e; font-size: 20px; font-weight: bold; text-align: center; margin-top: 10px; border-top: 1px solid #555; padding-top: 10px; }
        label { display: block; text-align: left; margin-left: 5%; font-size: 13px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #e94560;">Orionyx Master Matcher</h2>
    
    <label>First Base:</label>
    <select id="type1">
        <option value="b1">Base 1</option><option value="b2">Base 2</option>
        <option value="b3">Base 3</option><option value="b4">Base 4</option>
        <option value="dbl">Double</option><option value="fdbl">Fake Double</option>
    </select>
    <input type="number" id="num1" placeholder="Enter Number">

    <label>Second Base:</label>
    <select id="type2">
        <option value="b1">Base 1</option><option value="b2">Base 2</option>
        <option value="b3" selected>Base 3</option><option value="b4">Base 4</option>
        <option value="dbl">Double</option><option value="fdbl">Fake Double</option>
    </select>
    <input type="number" id="num2" placeholder="Enter Number">

    <button onclick="findMatches()">Compare Sequences</button>

    <div id="result-box">
        <div class="list-title" id="title1">List 1:</div>
        <div class="number-line" id="line1"></div>
        <div class="list-title" id="title2">List 2:</div>
        <div class="number-line" id="line2"></div>
        <div class="match-highlight" id="final-match"></div>
    </div>
</div>

<script>
const data = {
    b1: {"01":["12","02","90","91","92","93","28"],"12":["23","13","01","02","03","04","39"],"23":["34","24","12","13","14","15","40"],"34":["45","35","23","24","25","26","51"],"45":["56","46","34","35","36","37","62"],"56":["67","57","45","46","47","48","73"],"67":["78","68","56","57","58","59","84"],"78":["89","79","67","68","69","60","95"],"89":["90","80","78","79","70","71","06"],"90":["01","91","89","80","81","82","17"]},
    b2: {"02":["13","01","12","91","93"],"13":["24","12","23","02","04"],"24":["35","23","34","13","15"],"35":["46","34","45","24","26"],"46":["57","45","56","35","37"],"57":["68","56","67","46","48"],"68":["79","67","78","57","59"],"79":["80","78","89","68","60"],"80":["91","89","90","79","71"],"91":["02","90","01","80","82"]},
    b3: {
        "03":["14","15","12","92","48","28"],
        "14":["25","26","23","03","59","39"],
        "25":["36","37","34","14","60","40"],
        "36":["47","48","45","25","71","51"],
        "47":["58","59","56","36","82","62"],
        "58":["69","60","67","47","93","73"],
        "69":["70","71","78","58","04","84"],
        "70":["81","82","89","69","15","95"],
        "81":["92","93","90","70","26","06"],
        "92":["03","04","01","81","37","17"]
    },
    b4: {"04":["15","25","93","95","96","85"],"15":["26","36","04","06","07","96"],"26":["37","47","15","17","18","07"],"37":["48","58","26","28","29","18"],"48":["59","69","37","39","30","29"],"59":["60","70","48","40","41","30"],"60":["71","81","59","51","52","41"],"71":["82","92","60","62","63","52"],"82":["93","03","71","73","74","63"],"93":["04","14","82","84","85","74"]},
    dbl: {"00":["18","92","12","91","98"],"11":["29","03","23","02","09"],"22":["30","14","34","13","10"],"33":["41","25","45","24","21"],"44":["52","36","56","35","32"],"55":["63","47","67","46","43"],"66":["74","58","78","57","54"],"77":["85","69","89","68","65"],"88":["96","70","90","79","76"],"99":["07","81","01","80","87"]},
    fdbl: {"05":["17","26","93","84","96","14"],"16":["28","37","04","95","07","25"],"27":["39","48","15","06","18","36"],"38":["40","59","26","17","29","47"],"49":["51","60","37","28","30","58"]}
};

function getMirror(val) { return val.padStart(2, '0').split('').reverse().join(''); }

function findMatches() {
    let s1 = document.getElementById('type1');
    let s2 = document.getElementById('type2');
    let n1 = document.getElementById('num1').value.padStart(2, '0');
    let n2 = document.getElementById('num2').value.padStart(2, '0');
    
    let key1 = data[s1.value][n1] ? n1 : (data[s1.value][getMirror(n1)] ? getMirror(n1) : null);
    let key2 = data[s2.value][n2] ? n2 : (data[s2.value][getMirror(n2)] ? getMirror(n2) : null);

    if (key1 && key2) {
        let list1 = data[s1.value][key1];
        let list2 = data[s2.value][key2];
        let found = [];

        list1.forEach(num => {
            if (list2.includes(num) || list2.includes(getMirror(num))) { found.push(num); }
        });

        document.getElementById('result-box').style.display = "block";
        document.getElementById('title1').innerText = s1.options[s1.selectedIndex].text + " (" + key1 + "):";
        document.getElementById('line1').innerText = list1.join("  ");
        document.getElementById('title2').innerText = s2.options[s2.selectedIndex].text + " (" + key2 + "):";
        document.getElementById('line2').innerText = list2.join("  ");
        
        document.getElementById('final-match').innerText = found.length > 0 ? "COMMON: " + [...new Set(found)].join(", ") : "NO COMMON NUMBERS";
    } else {
        alert("Number not found in selected list.");
    }
}
</script>
</body>
</html>
